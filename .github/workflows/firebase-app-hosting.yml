name: Deploy to Firebase App Hosting
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Note: Firebase App Hosting typically handles deployment via its own 
      # internal connection to GitHub. This workflow can be used for 
      # additional checks or custom deployment steps if needed.
